<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Department Report Form</title>
    <style>
        body {
            background-color: rgba(0, 29, 5, 0.1);
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    </style>
</head>
<body>
    <a href="https://etachali2-prog.github.io/all/"style="color:blue;">BACK</a>
 <label>Language:</label>
<select onchange="location = this.value;">
  <option value="" disabled selected>Select Language</option>
  <option value="https://etachali2-prog.github.io/oreport/">Afaan Oromoo</option>
  <option value="https://etachali2-prog.github.io/reportForm/">English</option>
  <option value="https://etachali2-prog.github.io/Areport/">Amharic</option>
</select>
 <marquee> <h1 style="color:Green;">Department: Technical Department Report Form!</h1> </marquee> 
   
  <form id="myForm">
     
    <label>Date:</label><input type="date" name="Date" required>
    <label>Department:</label><input type="text" name="Department"><br><br>
    
    <label>Requested By:</label><input type="text" name="RequestedBy">
    <label>Requested Time:</label><input type="time" name="RequestedTime"><br><br>
    
    <label>Machine Name:</label><input type="text" name="MachineName">
    <label>Location:</label><input type="text" name="Location"><br><br>
    
    <label>Types of Maintenance Required:</label>
    <select name="MaintenanceType">
      <option value="Preventive Maintenance">Preventive Maintenance</option>
      <option value="Corrective Maintenance">Corrective Maintenance</option>
      <option value="Emergency Breakdown">Emergency Breakdown</option>
      <option value="Inspection">Inspection</option>
      <option value="Installation">Installation</option>
      <option value="Modification">Modification</option>
    </select><br><br>
    
    <label>Description of Problem:</label><br>
    <textarea name="ProblemDescription"></textarea><br><br>
    
    <label>Priority Level:</label>
    <select name="PriorityLevel">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
      <option value="Urgent">Urgent</option>
    </select><br><br>
    
    <label>Requested Maintenance Activity:</label>
    <select name="MaintenanceActivity">
      <option value="Electrical troubleshooting">Electrical troubleshooting</option>
      <option value="Mechanical repair">Mechanical repair</option>
      <option value="Workshop">Workshop</option>
    </select><br><br>
    
    <hr>
    <h3>Maintenance Department Action:</h3>
    <label>Assigned Technician Name:</label><input type="text" name="AssignedTechnician">
    <label>Date:</label><input type="date" name="Date">
    <label>Time:</label><input type="time" name="Time"><br><br>
    <label>Action taken:</label><br>
    <textarea name="ActionTaken"></textarea><br><br>

    <hr>
    <h3>Completion Information:</h3>
    <label>Work Start Time:</label><input type="time" name="WorkStartTime">
    <label>Work Completion Time:</label><input type="time" name="WorkCompletionTime">
    <label>Downtime Duration:</label><input type="text" name="DowntimeDuration"><br><br>

    <hr>
    <h3>Spare Part Requirement:</h3>
    <label>Item name:</label><input type="text" name="SpareItemName">
    <label>Part No/Specification:</label><input type="text" name="SparePartNo">
    <label>Unit:</label><input type="text" name="SpareUnit">
    <label>Quantity:</label><input type="number" name="SpareQuantity">
    <br><br>
    <label>Remark:</label><br>
    <textarea name="SpareRemark"></textarea><br><br>

    <hr>
    <label>Maintenance Status:</label>
    <select name="MaintenanceStatus">
      <option value="In progress">In progress</option>
      <option value="Completed">Completed</option>
      <option value="Pending">Pending</option>
    </select><br><br>
    
    <label>If pending, why?</label><br>
    <textarea name="PendingReason"></textarea><br><br>
    
    <hr>
    <h3>Verification:</h3>
    <label>Supervisor/Team Leader Name:</label>
    <input type="text" name="SupervisorName"><br><br>
    <label>Technic Team Leader Name:</label>
    <input type="text" name="TechnicTeamLeaderName"><br><br>

    <button type="submit">Submit</button>
  </form>
  
<script>
  const form = document.getElementById('myForm');
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzUsSM2UG_hlM1uGYfMXBeI3usddMsyyzyZMoRe4DbU0W5QhCDKTED7Pb1TbXTJy1gVLA/exec'; 

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    const submitBtn = form.querySelector('button[type="submit"]');
    submitBtn.textContent = 'Sending...';
    submitBtn.disabled = true;
    
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
         alert('Thank you! The report has been sent successfully.');
         form.reset(); 
         submitBtn.textContent = 'Submit';
         submitBtn.disabled = false;
      })
      .catch(error => {
         console.error('Error!', error.message);
         alert('Error sending form. Please try again.');
         submitBtn.textContent = 'Submit';
         submitBtn.disabled = false;
      });
  });
</script>
</body>
</html>
